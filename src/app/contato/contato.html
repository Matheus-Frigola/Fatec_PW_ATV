<h3>Fale Conosco</h3>
Ola seja benvindo a nossa loja virtual, qualquer
duvida estamos a dispocição, entre em contato pelo 
formulario abaixo:
<br><br>
<h4>{{alerta}}</h4><br><br>
nome: <input type="text" [(ngModel)]="obj.nome" placeholder="digite seu nome completo"/>
<br>
email: <input type="email" [(ngModel)]="obj.email" placeholder="informe seu email"/>
<br>
assunto: <select [(ngModel)]="obj.assunto">
    <option>Duvidas com produtos</option>
    <option>Duvidas com pedidos</option>
    <option>Problemas gerais</option>
    <option>Criticas e sugestões</option>
</select><br>
mensagem:<textarea [(ngModel)]="obj.mensagem" rows="5" cols="50"></textarea>
<br>
<input type="checkbox" [(ngModel)]="obj.copia">Desejo receber uma copia desse email
<br>
<button (click)="enviar()">Enviar</button>

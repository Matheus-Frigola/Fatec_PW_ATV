<div class="container">
  <h2>Login</h2>

  <form [formGroup]="formLogin" (ngSubmit)="login()">

    <label>Email</label>
    <input type="email" formControlName="email" placeholder="Digite seu email">

    <label>Senha</label>
    <input type="password" formControlName="senha" placeholder="Digite sua senha">

    <button type="submit">Entrar</button>

  </form>

  <p>
    Não possui conta?
    <a routerLink="/cadastro">Cadastrar</a>
  </p>
</div>
